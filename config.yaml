assistant:
  name: Boris
  language: es
  wake_word: boris
  wake_word_model: data/models/boris_wakeword.onnx
  wake_word_threshold: 0.3
  summon_phrase: "manifiéstate"
  dismiss_phrase: "eso es todo"
  summon_timeout_s: 120
  follow_up_timeout_s: 10

audio:
  input_device_name: Razer Seiren X
  feedback_sounds: true
  feedback_volume: 0.3

stt:
  model: small         # small en CPU ~0.3s; medium ~2.5s; large-v3 necesita GPU
  language: es
  device: cpu

tts:
  model: vits_es      # vits_es (rápido, ~300ms) o xtts_v2 (lento, voz clonada)
  language: es
  speaker_wav:         # solo para xtts_v2
  pitch_semitones: -3  # voz más grave (-3 semitonos)

llm:
  model: gemma3:12b    # gemma3:12b (~7GB, rápido) o gemma4-26b (17GB, lento)
  temperature: 0.7
  max_tokens: 256

memory:
  profile_max_tokens: 800
  index_max_tokens: 400
  data_dir: data/memory

skills:
  home:
    enabled: false
  garmin:
    enabled: true
  music:
    backend: spotify
  search:
    url: http://localhost:8080
